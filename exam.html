<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Falcon AI Exam Mode</title>

    <link rel="stylesheet"
    href="exam.css">

</head>

<body>

    <div class="background"></div>

    <main class="main-content">

        <h1 class="page-title">

            Exam Mode

        </h1>

        <div class="exam-size-container">

            <button class="exam-size-btn" id="btn15">
                15 MCQs
            </button>

            <button class="exam-size-btn" id="btn30">
                30 MCQs
            </button>

            <button class="exam-size-btn" id="btn60">
                60 MCQs
            </button>

        </div>

        <div class="exam-layout">

            <div class="question-panel">

                <div class="exam-stats">

                    <div class="stat-box">

                        <h3>Timer</h3>

                        <p id="timer">
                            00:00
                        </p>

                    </div>

                    <div class="stat-box">

                        <h3>Answered</h3>

                        <p id="answeredCount">
                            0
                        </p>

                    </div>

                    <div class="stat-box">

                        <h3>Remaining</h3>

                        <p id="remainingCount">
                            0
                        </p>

                    </div>

                </div>

                <div class="question-card">

                    <div
                    class="question-number"
                    id="questionNumber">

                        Question 1

                    </div>

                    <h2
                    class="question"
                    id="questionText">

                        Loading Question...

                    </h2>

                    <div
                    class="options-container">

                        <div class="option">
                            Option A
                        </div>

                        <div class="option">
                            Option B
                        </div>

                        <div class="option">
                            Option C
                        </div>

                        <div class="option">
                            Option D
                        </div>

                    </div>

                    <div class="action-buttons">

                        <button class="prev-btn" id="prevBtn">
                            Previous
                        </button>

                        <button class="next-btn" id="nextBtn">
                            Next
                        </button>

                        <button class="submit-btn" id="submitExamBtn">
                            Submit Exam
                        </button>

                    </div>

                </div>

            </div>

            <div class="navigator-panel">

                <h3>
                    Question Navigator
                </h3>

                <div
                class="navigator-grid"
                id="navigatorGrid">

                </div>

                <div class="legend">

                    <div>
                        🟧 Current
                    </div>

                    <div>
                        🟩 Answered
                    </div>

                    <div>
                        🟦 Unanswered
                    </div>

                </div>

            </div>

        </div>

    </main>

    <script src="exam.js"></script>

</body>

</html>
