<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Interactive Explainer</title>

    <link rel="stylesheet" href="explainer.css">

</head>

<body>
    <div class="space-scene">

        <div class="stars"></div>

        <div class="stars stars2"></div>

        <div class="nebula"></div>

        <div class="planet planet1"></div>

        <div class="planet planet2"></div>

        <div class="asteroids"></div>

    </div>

    <nav>

        <div class="logo-section">

            <img src="assets/Falcon 1.png" alt="nav-logo" class="nav-logo">

            <h2>FALCON AI</h2>

        </div>

    </nav>


    <div class="main-content">

        <h1>
            Interactive Explainer
        </h1>

        <p class="subtitle">
            Choose how Falcon AI will guide your learning experience.
        </p>


        <div class="cards-container">


            <!-- 3D TEACHING -->

            <div class="card">

                <h2>3D Teaching</h2>

                <p>
                    Learn through immersive holographic visualizations and animated simulations.
                </p>

                <button onclick="window.location.href='3d.html'">
                    Enter 3D Learning
                </button>

            </div>


            <!-- TEXT TEACHING -->

            <div class="card">

                <h2>Text Teaching</h2>

                <p>
                    Learn through adaptive AI explanations and intelligent tutoring guidance.
                </p>

                <button onclick="window.location.href='text.html'">
                    Enter Text Learning
                </button>

            </div>

        </div>

    </div>

</body>

</html>
