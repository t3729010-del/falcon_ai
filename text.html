<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Falcon AI - Text Teaching</title>

    <link rel="stylesheet"
    href="text.css">

</head>

<body>

    <button class="menu-toggle">

        ☰

    </button>
    <!-- SPACE BACKGROUND -->

    <div class="space-scene">

        <div class="stars"></div>

        <div class="stars stars2"></div>

        <div class="nebula"></div>

    </div>


    <!-- SIDEBAR -->

    <aside class="sidebar active">

        <div class="logo-section">

            <img src="../assets/Falcon 1.png" alt="Falcon-logo"
            class="logo">

            <h2>FALCON AI</h2>

        </div>


        <button class="new-chat">

            + New Session

        </button>

        <input
            type="text"
            id="sessionSearch"
            placeholder="Search lessons..."
        >


        <div class="chat-history"></div>

        <div class="archived-title">
            📦 Archived Lessons
        </div>

        <div class="archived-history"></div>

    </aside>


    <!-- MAIN CHAT AREA -->

    <main class="chat-area">


        <!-- TOP BAR -->

        <div class="top-bar">

            <h1>Text Teaching</h1>

            <p>
                Adaptive AI-powered learning environment
            </p>

        </div>


        <!-- CHAT BOX -->

        <div class="chat-box">


            <!-- AI MESSAGE -->

            <div class="message ai-message">

                <div class="message-content">

                    Hello. I am Falcon AI.
                    What would you like to learn today?

                </div>

            </div>

        </div>


        <!-- INPUT AREA -->

        <div class="input-area">

            <button class="voice-btn">

                🎤

            </button>


            <input
            type="text"
            placeholder="Ask Falcon AI anything...">


            <button class="send-btn">

                ➤

            </button>

        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="text.js"></script>

</body>

</html>
